<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RGPH — Suivi Terrain</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0D1B2A;--navy2:#1A3A5C;--gold:#C9A84C;--gold-l:#F0D98A;
  --bg:#F4F2EE;--card:#FFFFFF;--surface:#F0EDE8;
  --text:#1A1A1A;--muted:#7A7570;--border:#E2DDD8;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --teal:#0F6E56;--teal-l:#E1F5EE;
  --coral:#993C1D;--coral-l:#FAECE7;
  --radius:14px;--radius-sm:9px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}

/* ── LOGIN ── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,#0D1B2A 0%,#1A3A5C 55%,#0D2A1A 100%);
  padding:1rem;
}
.login-box{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);
  border-radius:20px;padding:2rem 1.75rem;width:100%;max-width:420px;
  backdrop-filter:blur(12px);
}
.login-logo{text-align:center;margin-bottom:1.75rem}
.l-badge{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-l);
  background:rgba(201,168,76,0.18);padding:4px 14px;border-radius:20px;display:inline-block;margin-bottom:12px}
.l-title{font-size:24px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.l-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px}
.l-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin:0 0 10px}
.user-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.user-btn{
  display:flex;align-items:center;gap:12px;padding:13px 15px;
  border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.04);cursor:pointer;color:#fff;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  transition:all .2s;width:100%;text-align:left;
}
.user-btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.22)}
.user-btn.sel{background:rgba(201,168,76,0.18);border-color:rgba(201,168,76,0.55)}
.u-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.av-b{background:rgba(24,95,165,0.35);color:#85B7EB}
.av-t{background:rgba(15,110,86,0.35);color:#5DCAA5}
.av-c{background:rgba(153,60,29,0.35);color:#F0997B}
.av-g{background:rgba(201,168,76,0.28);color:var(--gold-l)}
.u-role{font-size:10px;color:rgba(255,255,255,0.38);margin-top:1px}
.l-sep{border:none;border-top:1px solid rgba(255,255,255,0.09);margin:1.1rem 0}
.login-btn{
  width:100%;padding:13px;background:var(--gold);color:#0D1B2A;
  border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;letter-spacing:.2px;
}
.login-btn:hover{opacity:.88}
.login-btn:active{opacity:.75;transform:scale(.99)}

/* ── APP SHELL ── */
#app-screen{display:none;min-height:100vh;flex-direction:column}
.topbar{
  background:var(--navy);color:#fff;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.25rem;position:sticky;top:0;z-index:100;flex-shrink:0;
}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-badge{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-l);background:rgba(201,168,76,0.18);padding:3px 10px;border-radius:20px}
.tb-title{font-size:14px;font-weight:600}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-user{font-size:11px;color:rgba(255,255,255,0.45)}
.logout-btn{font-size:11px;color:rgba(255,255,255,0.4);background:none;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:5px 11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.logout-btn:hover{color:#fff;border-color:rgba(255,255,255,0.35)}

.main{padding:1.25rem;max-width:680px;margin:0 auto;width:100%;flex:1}

/* ── CARDS ── */
.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}

/* ── AGENT HEADER ── */
.agent-hero{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;
  display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);
}
.hero-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.hero-name{font-size:16px;font-weight:600;color:#fff;line-height:1.3}
.hero-sub{font-size:11px;color:rgba(255,255,255,0.42);margin-top:3px}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-box{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:22px;font-weight:700;color:var(--text);line-height:1}
.stat-lbl{font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.3px;text-transform:uppercase}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.fg input,.fg select{
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;font-size:14px;background:var(--surface);color:var(--text);
  font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border .15s;
  -webkit-appearance:none;
}
.fg input:focus{border-color:var(--blue);background:#fff}
.fg-full{grid-column:1/-1}
.fg-hint{font-size:10px;color:var(--muted);margin-top:2px}
.save-btn{
  width:100%;padding:13px;background:var(--navy2);color:#fff;
  border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.save-btn:hover{background:var(--navy)}
.save-btn:active{transform:scale(.99)}
.save-btn:disabled{opacity:.55;cursor:not-allowed}

/* ── HISTORY ── */
.hist-item{
  display:flex;align-items:center;gap:10px;padding:11px 0;
  border-bottom:.5px solid var(--border);
}
.hist-item:last-child{border-bottom:none}
.hist-date{font-size:12px;font-weight:500;color:var(--text);min-width:80px}
.hist-zd{font-size:9px;color:var(--blue);font-family:'DM Mono',monospace;background:var(--blue-l);padding:2px 7px;border-radius:4px;display:inline-block;margin-top:3px}
.hist-nums{display:flex;gap:10px;flex:1;justify-content:flex-end}
.hn{text-align:center;min-width:38px}
.hn-val{font-size:14px;font-weight:700;color:var(--text)}
.hn-lab{font-size:9px;color:var(--muted)}
.edit-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .15s;white-space:nowrap}
.edit-btn:hover{border-color:var(--blue);color:var(--blue)}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:2rem;font-style:italic}

/* ── CHEF ── */
.chef-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.chef-title{font-size:19px;font-weight:700;color:var(--text)}
.chef-sub{font-size:11px;color:var(--muted);margin-top:2px}
.refresh-btn{
  display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;
  color:var(--navy2);transition:all .15s;box-shadow:var(--shadow);
}
.refresh-btn:hover{background:var(--navy2);color:#fff;border-color:var(--navy2)}
.spin{animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.chef-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.cs{background:var(--card);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;box-shadow:var(--shadow)}
.cs-num{font-size:26px;font-weight:700;line-height:1}
.cs-num.gold{color:#B07D20}
.cs-lbl{font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.3px}

.ap-card{background:var(--card);border:.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:10px;box-shadow:var(--shadow)}
.ap-top{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.ap-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ap-name{font-size:13px;font-weight:600;color:var(--text)}
.ap-days{font-size:10px;color:var(--muted);margin-top:2px}
.ap-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.an{background:var(--surface);border-radius:8px;padding:8px 6px;text-align:center}
.an-val{font-size:17px;font-weight:700}
.an-lab{font-size:9px;color:var(--muted);margin-top:2px}
.prog-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px}
.prog-bar{height:5px;background:var(--surface);border-radius:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:5px;transition:width .6s ease}
.last-entry{font-size:11px;color:var(--muted);margin-top:9px;padding-top:9px;border-top:.5px solid var(--border)}

.sync-badge{font-size:10px;color:var(--muted);text-align:center;padding:.75rem;font-style:italic}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px}
.modal-fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.modal-fg label{font-size:11px;color:var(--muted);font-weight:500}
.modal-fg input{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;width:100%;outline:none}
.modal-fg input:focus{border-color:var(--blue);background:#fff}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-cancel{flex:1;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--muted)}
.modal-save{flex:1;padding:10px;background:var(--navy2);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.modal-save:disabled{opacity:.5;cursor:not-allowed}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);
  background:var(--navy);color:#fff;padding:11px 22px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;transition:transform .3s ease;z-index:400;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.25);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#2E7D32}
.toast.err{background:#B71C1C}

/* ── LOADER ── */
.loader{text-align:center;padding:2.5rem;color:var(--muted);font-size:13px}
.loader-spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--navy2);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .main{padding:1rem .875rem}
  .login-box{padding:1.75rem 1.25rem}
  .l-title{font-size:20px}
  .stats-row{gap:6px}
  .stat-num{font-size:19px}
  .form-grid{grid-template-columns:1fr}
  .fg-full{grid-column:1}
  .chef-stats{gap:6px}
  .cs-num{font-size:22px}
  .topbar{padding:0 1rem}
  .tb-user{display:none}
  .hist-nums{gap:6px}
  .hn-val{font-size:13px}
}
@media(max-width:360px){
  .stats-row{grid-template-columns:1fr 1fr;gap:6px}
  .stat-box:last-child{grid-column:1/-1}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="l-badge">4e RGPH / RGAE · BUCREP</div>
      <div class="l-title">Suivi de Recensement</div>
      <div class="l-sub">Équipe Zone de Dénombrement · Yaoundé</div>
    </div>

    <div class="l-section">Agents recenseurs</div>
    <div class="user-grid">
      <button class="user-btn" onclick="selectUser('pauline',this)">
        <div class="u-av av-b">PM</div>
        <div><div>Melingui Bomba Pauline Marie</div><div class="u-role">Agent Recenseur</div></div>
      </button>
      <button class="user-btn" onclick="selectUser('innocent',this)">
        <div class="u-av av-t">BI</div>
        <div><div>Margaba Batouri Innocent</div><div class="u-role">Agent Recenseur</div></div>
      </button>
      <button class="user-btn" onclick="selectUser('jeanne',this)">
        <div class="u-av av-c">JM</div>
        <div><div>Messina Messi Jeanne</div><div class="u-role">Agent Recenseur</div></div>
      </button>
    </div>

    <hr class="l-sep">
    <div class="l-section">Chef d'équipes</div>
    <div class="user-grid">
      <button class="user-btn" onclick="selectUser('chef',this)">
        <div class="u-av av-g">D</div>
        <div><div>Dongle</div><div class="u-role">Chef d'équipes · Accès complet</div></div>
      </button>
    </div>
    <hr class="l-sep">
    <button class="login-btn" onclick="doLogin()">Accéder à mon espace →</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app-screen">
  <div class="topbar">
    <div class="tb-left">
      <span class="tb-badge">RGPH 2024</span>
      <span class="tb-title">Suivi Terrain</span>
    </div>
    <div class="tb-right">
      <span class="tb-user" id="tb-name"></span>
      <button class="logout-btn" onclick="logout()">← Quitter</button>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<!-- ══ MODAL EDIT ══ -->
<div class="modal-bg" id="edit-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">Modifier la saisie</div>
    <div class="modal-fg"><label>Structures identifiées</label><input type="number" id="e-struct" min="0"></div>
    <div class="modal-fg"><label>Structures numérotées</label><input type="number" id="e-num" min="0"></div>
    <div class="modal-fg"><label>Ménages ordinaires</label><input type="number" id="e-men" min="0"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-save" id="modal-save-btn" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ CONFIG JSONBIN ══
const BIN_ID  = '69ea9b05aaba8821972f44f5';
const API_KEY = '$2a$10$phoNGUlUffuXacxn2E8r5.yFLfQ3L/bQ9SshS7i2amo4X3CaR4fz6';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS = {'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Versioning':'false'};

// ══ AGENTS ══
const AGENTS = {
  pauline:  {name:'Melingui Bomba Pauline Marie', short:'Pauline M.',  ini:'PM', av:'av-b', hav:'rgba(24,95,165,0.2)',  hat:'#85B7EB',  prog:'#185FA5', lbl:'blue'},
  innocent: {name:'Margaba Batouri Innocent',      short:'Innocent M.', ini:'BI', av:'av-t', hav:'rgba(15,110,86,0.2)', hat:'#5DCAA5',  prog:'#0F6E56', lbl:'teal'},
  jeanne:   {name:'Messina Messi Jeanne',          short:'Jeanne M.M.', ini:'JM', av:'av-c', hav:'rgba(153,60,29,0.2)',hat:'#F0997B',  prog:'#993C1D', lbl:'coral'},
  chef:     {name:'Dongle',                        short:'Dongle',      ini:'D',  av:'av-g', hav:'rgba(201,168,76,0.2)',hat:'#F0D98A', prog:'#C9A84C', lbl:'gold'}
};

let currentUser = null;
let selectedBtn = null;
let editingId   = null;
let remoteData  = {entries:[]};
let isSaving    = false;

// ══ JSONBIN API ══
async function fetchData(){
  try{
    const r = await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    const j = await r.json();
    remoteData = j.record || {entries:[]};
    if(!Array.isArray(remoteData.entries)) remoteData.entries = [];
  } catch(e){ remoteData={entries:[]}; }
}

async function pushData(){
  await fetch(BIN_URL,{method:'PUT',headers:HEADERS,body:JSON.stringify(remoteData)});
}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ══ LOGIN ══
function selectUser(id,btn){
  currentUser=id;
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

async function doLogin(){
  if(!currentUser){showToast('Sélectionnez un utilisateur','err');return;}
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  document.getElementById('app-screen').style.flexDirection='column';
  document.getElementById('tb-name').textContent=AGENTS[currentUser].short;
  document.getElementById('main').innerHTML='<div class="loader"><div class="loader-spinner"></div>Chargement des données…</div>';
  await fetchData();
  if(currentUser==='chef') renderChef(); else renderAgent();
}

function logout(){
  currentUser=null;selectedBtn=null;
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

// ══ AGENT VIEW ══
function renderAgent(){
  const a = AGENTS[currentUser];
  const entries = remoteData.entries.filter(e=>e.agentId===currentUser);
  const totalS = entries.reduce((s,e)=>s+(e.structures||0),0);
  const totalN = entries.reduce((s,e)=>s+(e.numbered||0),0);
  const totalM = entries.reduce((s,e)=>s+(e.menages||0),0);
  const days   = new Set(entries.map(e=>e.date)).size;
  const today  = new Date().toISOString().split('T')[0];
  const todayE = entries.find(e=>e.date===today);
  const sorted = [...entries].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,15);

  document.getElementById('main').innerHTML=`
    <div class="agent-hero">
      <div class="hero-av" style="background:${a.hav};color:${a.hat}">${a.ini}</div>
      <div>
        <div class="hero-name">${a.name}</div>
        <div class="hero-sub">Agent Recenseur · ${days} jour${days>1?'s':''} de terrain</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">${totalS}</div><div class="stat-lbl">Identifiées</div></div>
      <div class="stat-box"><div class="stat-num">${totalN}</div><div class="stat-lbl">Numérotées</div></div>
      <div class="stat-box"><div class="stat-num">${totalM}</div><div class="stat-lbl">Ménages</div></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="card-dot"></span>${todayE?"Mettre à jour — aujourd'hui":"Saisie du jour"}</div>
      <div class="form-grid">
        <div class="fg"><label>Date</label><input type="date" id="s-date" value="${today}"></div>
        <div class="fg"><label>ZD travaillée</label><input type="text" id="s-zd" placeholder="Ex: 001" maxlength="3" value="${todayE?.zd||''}"></div>
        <div class="fg"><label>Structures identifiées</label><input type="number" id="s-str" placeholder="0" min="0" value="${todayE?.structures||''}"></div>
        <div class="fg"><label>Structures numérotées</label><input type="number" id="s-num" placeholder="0" min="0" value="${todayE?.numbered||''}"></div>
        <div class="fg fg-full"><label>Ménages ordinaires numérotés</label><input type="number" id="s-men" placeholder="0" min="0" value="${todayE?.menages||''}">
          <div class="fg-hint">Total cumulé pour la journée sélectionnée</div>
        </div>
      </div>
      <button class="save-btn" id="save-btn" onclick="saveSaisie()">
        <span id="save-icon">💾</span><span id="save-txt">Enregistrer ma progression</span>
      </button>
    </div>

    <div class="card">
      <div class="card-title"><span class="card-dot"></span>Mes saisies (${entries.length})</div>
      ${sorted.length===0?'<div class="empty">Aucune saisie pour le moment.</div>':sorted.map(e=>{
        const dl=new Date(e.date+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
        return`<div class="hist-item">
          <div style="min-width:82px"><div class="hist-date">${dl}</div>${e.zd?`<span class="hist-zd">ZD ${e.zd}</span>`:''}</div>
          <div class="hist-nums">
            <div class="hn"><div class="hn-val">${e.structures||0}</div><div class="hn-lab">identif.</div></div>
            <div class="hn"><div class="hn-val">${e.numbered||0}</div><div class="hn-lab">numérot.</div></div>
            <div class="hn"><div class="hn-val">${e.menages||0}</div><div class="hn-lab">ménages</div></div>
          </div>
          <button class="edit-btn" onclick="openEdit('${e.id}')">Modifier</button>
        </div>`;
      }).join('')}
    </div>
    <div class="sync-badge">Données synchronisées avec JSONBin.io</div>
  `;
}

async function saveSaisie(){
  if(isSaving) return;
  const date=document.getElementById('s-date').value;
  if(!date){showToast('Entrez une date','err');return;}
  isSaving=true;
  const btn=document.getElementById('save-btn');
  btn.disabled=true;
  document.getElementById('save-icon').textContent='⏳';
  document.getElementById('save-txt').textContent='Enregistrement…';

  await fetchData();
  const idx=remoteData.entries.findIndex(e=>e.agentId===currentUser&&e.date===date);
  const entry={
    id: idx>=0 ? remoteData.entries[idx].id : genId(),
    agentId:currentUser, date,
    zd:document.getElementById('s-zd').value.trim(),
    structures:parseInt(document.getElementById('s-str').value)||0,
    numbered:parseInt(document.getElementById('s-num').value)||0,
    menages:parseInt(document.getElementById('s-men').value)||0,
    updatedAt:Date.now()
  };
  if(idx>=0) remoteData.entries[idx]=entry; else remoteData.entries.push(entry);
  try{
    await pushData();
    showToast('Progression enregistrée !','ok');
  } catch(e){ showToast('Erreur de connexion','err'); }
  isSaving=false;
  renderAgent();
}

// ══ MODAL EDIT ══
function openEdit(id){
  const e=remoteData.entries.find(x=>x.id===id);
  if(!e) return;
  editingId=id;
  document.getElementById('e-struct').value=e.structures||0;
  document.getElementById('e-num').value=e.numbered||0;
  document.getElementById('e-men').value=e.menages||0;
  document.getElementById('edit-modal').style.display='flex';
}
function closeModal(){document.getElementById('edit-modal').style.display='none';editingId=null;}

async function saveEdit(){
  if(!editingId) return;
  const btn=document.getElementById('modal-save-btn');
  btn.disabled=true;btn.textContent='…';
  await fetchData();
  const idx=remoteData.entries.findIndex(e=>e.id===editingId);
  if(idx>=0){
    remoteData.entries[idx].structures=parseInt(document.getElementById('e-struct').value)||0;
    remoteData.entries[idx].numbered=parseInt(document.getElementById('e-num').value)||0;
    remoteData.entries[idx].menages=parseInt(document.getElementById('e-men').value)||0;
    remoteData.entries[idx].updatedAt=Date.now();
    try{ await pushData(); showToast('Saisie modifiée','ok'); } catch(e){ showToast('Erreur réseau','err'); }
  }
  btn.disabled=false;btn.textContent='Enregistrer';
  closeModal();
  if(currentUser==='chef') renderChef(); else renderAgent();
}

// ══ CHEF VIEW ══
function renderChef(){
  const all=remoteData.entries;
  const agIds=['pauline','innocent','jeanne'];
  const totalS=all.reduce((s,e)=>s+(e.structures||0),0);
  const totalM=all.reduce((s,e)=>s+(e.menages||0),0);
  const daysSet=new Set(all.map(e=>e.date));
  const lastTs=all.length?Math.max(...all.map(e=>e.updatedAt||0)):0;
  const lastStr=lastTs?new Date(lastTs).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'--';

  const agCards=agIds.map(id=>{
    const a=AGENTS[id];
    const ents=all.filter(e=>e.agentId===id);
    const s=ents.reduce((x,e)=>x+(e.structures||0),0);
    const n=ents.reduce((x,e)=>x+(e.numbered||0),0);
    const m=ents.reduce((x,e)=>x+(e.menages||0),0);
    const d=new Set(ents.map(e=>e.date)).size;
    const pct=Math.min(100,Math.round((s/50)*100));
    const last=[...ents].sort((a,b)=>b.date.localeCompare(a.date))[0];
    const lastLbl=last?new Date(last.date+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})+(last.zd?' · ZD '+last.zd:''):'Aucune saisie';
    return`<div class="ap-card">
      <div class="ap-top">
        <div class="ap-av" style="background:${a.hav};color:${a.hat}">${a.ini}</div>
        <div><div class="ap-name">${a.name}</div><div class="ap-days">${d} jour${d>1?'s':''} de terrain</div></div>
      </div>
      <div class="ap-nums">
        <div class="an"><div class="an-val" style="color:${a.prog}">${s}</div><div class="an-lab">identifiées</div></div>
        <div class="an"><div class="an-val">${n}</div><div class="an-lab">numérotées</div></div>
        <div class="an"><div class="an-val">${m}</div><div class="an-lab">ménages</div></div>
      </div>
      <div class="prog-meta"><span>Progression</span><span>${pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${a.prog}"></div></div>
      <div class="last-entry">Dernière saisie : ${lastLbl}${last?' · '+last.structures+' structures':''}</div>
    </div>`;
  }).join('');

  const recent=[...all].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).slice(0,10);

  document.getElementById('main').innerHTML=`
    <div class="chef-header">
      <div><div class="chef-title">Tableau de bord</div><div class="chef-sub">4e RGPH / RGAE · Chef d'équipes</div></div>
      <button class="refresh-btn" onclick="doRefresh()"><span id="ref-ico">↻</span> Actualiser</button>
    </div>

    <div class="chef-stats">
      <div class="cs"><div class="cs-num gold">${totalS}</div><div class="cs-lbl">Structures</div></div>
      <div class="cs"><div class="cs-num">${totalM}</div><div class="cs-lbl">Ménages</div></div>
      <div class="cs"><div class="cs-num">${daysSet.size}</div><div class="cs-lbl">Jours terrain</div></div>
    </div>

    <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Progression par agent</div>
    ${agCards}

    <div class="card" style="margin-top:.5rem">
      <div class="card-title"><span class="card-dot"></span>Dernières mises à jour</div>
      ${recent.length===0?'<div class="empty">Aucune saisie enregistrée.</div>':recent.map(e=>{
        const a=AGENTS[e.agentId];
        const dl=new Date(e.date+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
        return`<div class="hist-item">
          <div class="ap-av" style="width:32px;height:32px;font-size:10px;background:${a.hav};color:${a.hat};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">${a.ini}</div>
          <div style="flex:1"><div style="font-size:12px;font-weight:500">${a.short}</div><div style="font-size:10px;color:var(--muted)">${dl}${e.zd?' · ZD '+e.zd:''}</div></div>
          <div class="hist-nums">
            <div class="hn"><div class="hn-val">${e.structures||0}</div><div class="hn-lab">struct.</div></div>
            <div class="hn"><div class="hn-val">${e.menages||0}</div><div class="hn-lab">ménages</div></div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="sync-badge">Dernière actualisation : ${lastStr} · JSONBin.io</div>
  `;
}

async function doRefresh(){
  const ico=document.getElementById('ref-ico');
  ico.classList.add('spin');
  await fetchData();
  renderChef();
  ico.classList.remove('spin');
  showToast('Données actualisées','ok');
}

// ══ TOAST ══
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
</script>
</body>
</html>
